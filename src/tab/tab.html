<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ollama Reply</title>
    <link rel="stylesheet" href="../css/pico.min.css" />
    <style>
      :root { --pico-font-size: 15px; }
      body { padding: 1rem; max-width: 1000px; margin: 0 auto; }
      .mail-info {
        background: var(--pico-card-background-color);
        padding: 1rem;
        border-radius: var(--pico-border-radius);
        margin-bottom: 1rem;
        border: 1px solid var(--pico-card-border-color);
        display: none;
      }
      .mail-info.show { display: block; }
      .mail-header-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--pico-muted-color); }
      #mail-body { font-size: 0.9rem; margin-top: 0.5rem; white-space: pre-wrap; color: var(--pico-muted-color); }
      
      .gen-controls { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 1rem; }
      .gen-controls > * { flex: 1; margin-bottom: 0; }
      .gen-controls label { font-size: 0.8rem; margin-bottom: 0.2rem; }
      .gen-btn-col { flex: 0 0 auto; }

      #reply-section { display: none; }
      #reply-section.show { display: block; }
      
      #candidate-tabs { display: flex; gap: 2px; margin-bottom: -1px; }
      .candidate-tab {
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
        border-radius: 6px 6px 0 0;
        border: 1px solid var(--pico-card-border-color);
        background: var(--pico-muted-background-color);
        cursor: pointer;
        position: relative;
      }
      .candidate-tab.active { background: var(--pico-background-color); border-bottom-color: var(--pico-background-color); z-index: 2; font-weight: bold; }

      .editor-container { position: relative; }
      #reply-text { height: 350px; border-radius: 0 6px 6px 6px; font-size: 1rem; font-family: inherit; }
      #preview-area {
        height: 350px; border-radius: 0 6px 6px 6px; font-size: 1rem; padding: 1rem;
        border: 1px solid var(--pico-card-border-color); background: var(--pico-background-color);
        overflow-y: auto; display: none;
      }
      #preview-area.show { display: block; }
      #preview-area p { margin-bottom: 0.5rem; }
      #preview-area ul, #preview-area ol { margin-bottom: 0.5rem; padding-left: 1.5rem; }

      .view-toggle { position: absolute; top: -35px; right: 0; font-size: 0.8rem; }
      
      .quick-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
      .action-chip {
        font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 1rem;
        background: var(--pico-muted-background-color); cursor: pointer; border: 1px solid transparent;
        transition: all 0.2s;
      }
      .action-chip:hover { border-color: var(--pico-primary); color: var(--pico-primary); }

      .refine-box {
        display: flex; gap: 0.5rem; margin-top: 0.5rem; padding: 1rem;
        background: var(--pico-card-background-color); border-radius: var(--pico-border-radius);
      }
      .refine-box input { flex: 1; margin-bottom: 0; }
      .refine-box button { margin-bottom: 0; white-space: nowrap; }

      .status { font-size: 0.85rem; margin-bottom: 1rem; padding: 0.4rem 0.8rem; border-radius: 4px; display: none; }
      .status:not(:empty) { display: block; }
      .status.info { background: #eef; color: #336; }
      .status.success { background: #efe; color: #262; }
      .status.error { background: #fee; color: #622; }
      .status.generating { background: #fff8e1; color: #795548; border: 1px solid #ffe082; }

      .toolbar { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: space-between; }
      .toolbar-left, .toolbar-right { display: flex; gap: 0.5rem; }
      
      .badge { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: #eee; margin-left: 0.5rem; vertical-align: middle; }
    </style>
  </head>
  <body>
    <div id="mail-info" class="mail-info">
      <div class="mail-header-row">
        <span id="mail-from"></span>
        <span id="mail-date"></span>
      </div>
      <div id="mail-subject" style="font-weight: bold; margin-top: 0.2rem"></div>
      <div id="mail-body"></div>
      <div id="thread-badge" class="badge" style="display:none"></div>
    </div>

    <div class="gen-controls">
      <div>
        <label for="tone" id="lbl-tone">トーン</label>
        <select id="tone">
          <option value="polite">丁寧 (Polite)</option>
          <option value="business">ビジネス (Business)</option>
          <option value="casual">カジュアル (Casual)</option>
          <option value="academic">学術的 (Academic)</option>
          <option value="mirror">文体適応 (Mirroring)</option>
        </select>
      </div>
      <div>
        <label for="language" id="lbl-lang">言語</label>
        <select id="language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
      <div>
        <label for="template" id="lbl-tpl">テンプレート</label>
        <select id="template"></select>
      </div>
      <div>
        <label for="model" id="lbl-model">モデル</label>
        <select id="model"></select>
      </div>
      <div>
        <label for="num-candidates" id="lbl-num">候補数</label>
        <input type="number" id="num-candidates" value="1" min="1" max="5" />
      </div>
      <div class="gen-btn-col">
        <button id="btn-generate">返信を生成</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div id="reply-section">
      <div style="position:relative">
        <div id="candidate-tabs"></div>
        <div class="view-toggle">
          <label style="margin:0"><input type="checkbox" id="opt-preview" role="switch" /> プレビュー</label>
        </div>
      </div>
      
      <div class="editor-container">
        <textarea id="reply-text" spellcheck="false"></textarea>
        <div id="preview-area"></div>
      </div>

      <div class="quick-actions" id="quick-actions">
        <span class="action-chip" data-prompt="もっと短く">短縮</span>
        <span class="action-chip" data-prompt="もっと丁寧に、謙譲語を適切に使って">より丁寧に</span>
        <span class="action-chip" data-prompt="承諾する返事を書いて">承諾</span>
        <span class="action-chip" data-prompt="丁重にお断りする内容にして">お断り</span>
        <span class="action-chip" data-prompt="打ち合わせの候補日時を3つ提示して">日程提示</span>
        <span class="action-chip" data-prompt="箇条書きを使ってわかりやすく整理して">要点整理</span>
      </div>

      <div class="refine-box">
        <input type="text" id="refine-input" placeholder="例：もっと短く、より丁寧に..." />
        <button id="btn-refine" class="secondary">修正指示</button>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <button id="btn-use-reply">返信ウィンドウを開く</button>
          <button id="btn-use-reply-all" class="outline">全員に返信</button>
          <label style="font-size: 0.85rem; margin-top: 0.6rem">
            <input type="checkbox" id="opt-signature" checked /> 署名付与
          </label>
        </div>
        <div class="toolbar-right">
          <button id="btn-regenerate" class="outline">再生成</button>
          <button id="btn-copy" class="outline">コピー</button>
        </div>
      </div>
    </div>

    <hr />
    <div class="toolbar" style="margin-top: 2rem">
      <div class="toolbar-left">
        <button id="toggle-history" class="outline btn-sm">履歴</button>
        <button id="toggle-templates" class="outline btn-sm">テンプレート編集</button>
        <button id="toggle-monitor" class="outline btn-sm">モニター</button>
      </div>
    </div>

    <div id="history-panel" style="display:none; margin-top: 1rem">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h3>履歴</h3>
        <button id="btn-clear-history" class="outline btn-sm">履歴消去</button>
      </div>
      <div id="history-list"></div>
      <p id="history-empty" style="text-align:center; padding: 2rem; color: #999">履歴はありません</p>
    </div>

    <div id="template-editor" style="display:none; margin-top: 1rem">
      <h3>テンプレート編集</h3>
      <div id="template-list"></div>
      <div style="margin-top:1rem; display:flex; gap:0.5rem">
        <button id="btn-add-template" class="outline">＋ 追加</button>
        <button id="btn-save-templates">保存</button>
      </div>
    </div>

    <div style="margin-top: 2rem; text-align: right; font-size: 0.8rem; color: #999">
      Ollama Reply v3.5.0 | <span id="timer">0s</span>
      <label style="display:inline-block; margin-left: 1rem">
        <input type="checkbox" id="opt-thread" checked /> スレッド文脈
      </label>
    </div>

    <script src="tab.js"></script>
  </body>
</html>
