<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ollama Reply Monitor</title>
    <link rel="stylesheet" href="../css/pico.min.css" />
    <style>
      :root {
        --pico-font-size: 16px;
      }
      body {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        padding: 1rem;
        text-align: center;
        border-radius: var(--pico-border-radius);
        background: var(--pico-card-background-color);
        border: 1px solid var(--pico-card-border-color);
      }
      .stat-value {
        font-size: 2rem;
        font-weight: bold;
        display: block;
      }
      .stat-label {
        font-size: 0.85rem;
        color: var(--pico-muted-color);
      }
      .feed-item {
        margin-bottom: 1.5rem;
        padding: 1.2rem;
        border-radius: var(--pico-border-radius);
        border-left: 6px solid var(--pico-muted-color);
        background: var(--pico-card-background-color);
        transition: transform 0.2s ease;
      }
      .feed-item.processing { border-left-color: var(--pico-primary); }
      .feed-item.done { border-left-color: var(--pico-ins-color); }
      .feed-item.error { border-left-color: var(--pico-del-color); }

      .feed-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.8rem;
      }
      .feed-subject { font-weight: bold; font-size: 1.1rem; }
      .feed-from { font-size: 0.9rem; color: var(--pico-muted-color); }
      .feed-badge {
        font-size: 0.75rem;
        padding: 0.2rem 0.6rem;
        border-radius: 1rem;
        background: var(--pico-muted-background-color);
      }
      .feed-stream {
        font-family: var(--pico-font-family-monospace);
        font-size: 0.85rem;
        background: rgba(0,0,0,0.05);
        padding: 0.8rem;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        margin-bottom: 0.5rem;
      }
      .feed-meta { font-size: 0.8rem; color: var(--pico-muted-color); }
      .cursor {
        display: inline-block;
        width: 8px;
        height: 1.2em;
        background: var(--pico-primary);
        margin-left: 2px;
        animation: blink 1s infinite;
        vertical-align: middle;
      }
      @keyframes blink { 50% { opacity: 0; } }
      #empty-state { text-align: center; padding: 4rem 2rem; color: var(--pico-muted-color); }

      /* Toggle switch style */
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .auto-toggle-box {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="header-row">
      <hgroup>
        <h1>Ollama Reply モニター</h1>
        <p>自動下書き生成のステータスをリアルタイムに表示します</p>
      </hgroup>
      <div class="auto-toggle-box">
        <span>自動生成:</span>
        <input type="checkbox" id="auto-toggle" role="switch" />
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="stat-queue">0</span>
        <span class="stat-label">待機/処理中</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-done" style="color: var(--pico-ins-color)">0</span>
        <span class="stat-label">完了</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-error" style="color: var(--pico-del-color)">0</span>
        <span class="stat-label">エラー</span>
      </div>
    </div>

    <div id="feed">
      <div id="empty-state">
        <p>現在、自動生成のログはありません。<br><small>新着メールを受信するとここに表示されます。</small></p>
      </div>
    </div>

    <script src="monitor.js"></script>
  </body>
</html>
