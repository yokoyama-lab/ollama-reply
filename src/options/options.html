<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ollama Reply - Settings</title>
    <link rel="stylesheet" href="../css/pico.min.css" />
    <style>
      :root {
        --pico-font-size: 16px;
      }
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      .saved-msg {
        display: none;
        background-color: var(--pico-ins-color);
        color: var(--pico-primary-inverse);
        padding: 0.5rem 1rem;
        border-radius: var(--pico-border-radius);
        margin-top: 1rem;
        text-align: center;
      }
      .saved-msg.show {
        display: block;
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .test-row {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      .test-row > * {
        flex: 1;
      }
      #test-result {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Ollama Reply 設定</h1>
      <p>Ollama サーバーの接続情報と生成パラメーターを設定します。</p>
    </header>

    <main class="container">
      <section id="connection">
        <h2 id="connection-title">サーバー接続</h2>
        <label for="ollamaUrl">
          Ollama URL
          <input
            type="url"
            id="ollamaUrl"
            placeholder="http://localhost:11434"
          />
        </label>

        <div class="test-row">
          <div>
            <button id="btn-test" class="secondary">接続テスト</button>
            <div id="test-result"></div>
          </div>
          <div>
            <button id="btn-fetch-models" class="outline">モデル一覧取得</button>
            <div id="model-list" style="font-size: 0.8rem; margin-top: 0.5rem"></div>
          </div>
        </div>
      </section>

      <hr />

      <section id="generation">
        <h2>生成設定</h2>
        <div class="grid">
          <label for="model">
            デフォルトモデル
            <input type="text" id="model" placeholder="gemma2:2b" />
          </label>
          <label for="maxTokens">
            最大トークン数
            <input type="number" id="maxTokens" value="1024" min="64" max="8192" />
          </label>
        </div>

        <label for="temperature">
          Temperature (ランダム性: 0.0 - 1.0)
          <input
            type="range"
            id="temperature"
            min="0"
            max="1"
            step="0.1"
            value="0.7"
          />
        </label>
      </section>

      <hr />

      <section id="context">
        <h2>コンテキスト設定</h2>
        <label for="threadContext">
          <input type="checkbox" id="threadContext" role="switch" checked />
          スレッド履歴（過去のやり取り）を含める
        </label>

        <label for="threadDepth">
          読み込むスレッドの深さ (件数)
          <input type="number" id="threadDepth" value="3" min="1" max="10" />
        </label>

        <label for="autoSignature">
          <input type="checkbox" id="autoSignature" role="switch" checked />
          Thunderbird の署名を自動付与する
        </label>
      </section>

      <hr />

      <section id="autodraft">
        <h2>自動下書き生成 (Auto-Draft)</h2>
        <label for="autoDraft">
          <input type="checkbox" id="autoDraft" role="switch" />
          新着メール受信時に自動で返信案を作成する
        </label>

        <div class="grid">
          <label for="autoDraftTone">
            トーン
            <select id="autoDraftTone">
              <option value="polite">丁寧 (Polite)</option>
              <option value="business">ビジネス (Business)</option>
              <option value="casual">カジュアル (Casual)</option>
              <option value="academic">学術的 (Academic)</option>
            </select>
          </label>
          <label for="autoDraftLanguage">
            言語
            <select id="autoDraftLanguage">
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>
        <small
          >※ 自動生成の進捗は「Ollama Reply モニター」で確認できます。</small
        >
      </section>

      <footer>
        <button id="btn-save">設定を保存</button>
        <div id="saved-msg" class="saved-msg">設定を保存しました</div>
      </footer>
    </main>

    <script src="options.js"></script>
  </body>
</html>
